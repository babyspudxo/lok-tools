<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lok之小撇步</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            earth: '#8C867E',
            light: '#F2F0EB',
            dark: '#44413C',
            card: '#FFFFFF',
          },
          fontFamily: {
            sans: ['system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    body { background: #F2F0EB; color: #44413C; }
    .card { transition: 0.2s; }
    .card:hover { transform: translateY(-3px); }
  </style>
</head>
<body class="p-4 max-w-4xl mx-auto">

  <header class="mb-5">
    <h1 class="text-2xl font-bold text-earth">Lok之小撇步</h1>
    <p class="text-sm opacity-70">實用小工具集合</p>
  </header>

  <div id="dashboard" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
    <div class="card bg-white rounded-xl p-4 shadow" onclick="go('url')">🔗 短網址</div>
    <div class="card bg-white rounded-xl p-4 shadow" onclick="go('pomodoro')">⏰ 番茄鐘</div>
    <div class="card bg-white rounded-xl p-4 shadow" onclick="go('qrcode')">📷 QR Code</div>
    <div class="card bg-white rounded-xl p-4 shadow" onclick="go('unit')">📏 單位轉換</div>
    <div class="card bg-white rounded-xl p-4 shadow" onclick="go('todo')">✅ 待辦事項</div>
    <div class="card bg-white rounded-xl p-4 shadow" onclick="go('translate')">🌐 翻譯</div>
    <div class="card bg-white rounded-xl p-4 shadow" onclick="go('rate')">💱 匯率</div>
    <div class="card bg-white rounded-xl p-4 shadow" onclick="go('color')">🎨 色彩靈感</div>
  </div>

  <div id="tool" class="hidden"></div>

  <script>
    function back() {
      document.getElementById('tool').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
    }

    function go(t) {
      document.getElementById('dashboard').classList.add('hidden');
      const tool = document.getElementById('tool');
      tool.classList.remove('hidden');
      tool.innerHTML = `<div onclick="back()" class="mb-3 text-earth font-bold">← 返回</div>`;

      if(t==='url'){
        tool.innerHTML+=`
        <h2 class="text-xl font-bold mb-3">🔗 短網址產生器</h2>
        <input id="u" class="w-full p-2 border rounded mb-2" placeholder="貼長網址">
        <button onclick="c=document.getElementById('u').value;document.getElementById('res').innerText='https://tinyurl.com/'+Math.random().toString(36).slice(2,8)" class="bg-earth text-white p-2 rounded">產生</button>
        <div id="res" class="mt-3 p-2 bg-white rounded"></div>`;
      }

      if(t==='pomodoro'){
        tool.innerHTML+=`
        <h2 class="text-xl font-bold mb-3">⏰ 番茄時鐘</h2>
        <div class="text-3xl text-center my-4" id="pomo">25:00</div>
        <button onclick="start()" class="bg-green-600 text-white p-2 rounded">開始</button>
        <button onclick="pause()" class="bg-orange-500 text-white p-2 rounded ms-1">暫停</button>
        <button onclick="reset()" class="bg-gray-600 text-white p-2 rounded ms-1">重設</button>`;
        let t=25*60,i;function up(){const m=Math.floor(t/60).toString().padStart(2,0);const s=(t%60).toString().padStart(2,0);document.getElementById('pomo').innerText=m+':'+s}function start(){i=setInterval(()=>{if(t<=0){clearInterval(i);alert('完成')}})}function pause(){clearInterval(i)}function reset(){t=25*60;up()}
      }

      if(t==='qrcode'){
        tool.innerHTML+=`
        <h2 class="text-xl font-bold mb-3">📷 QR Code</h2>
        <input oninput="gen()" id="qt" class="w-full p-2 border rounded mb-3" placeholder="輸入文字">
        <div id="q" class="w-48 h-48 bg-white p-2 rounded"></div>
        <button onclick="download()" class="mt-3 bg-earth text-white p-2 rounded">下載</button>
        <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"><\/script>
        <script>function gen(){QRCode.toCanvas(document.getElementById('q'),document.getElementById('qt').value,{width:180})}function download(){const a=document.createElement('a');a.href=document.querySelector('#q canvas').toDataURL();a.download='qrcode.png';a.click()}<\/script>`;
      }

      if(t==='unit'){
        tool.innerHTML+=`
        <h2 class="text-xl font-bold mb-3">📏 單位轉換</h2>
        <input type="number" id="v1" oninput="calc()" class="w-full p-2 border rounded mb-2" value="1">
        <select id="unit1" onchange="calc()" class="w-full p-2 border rounded mb-2"><option>公斤</option><option>磅</option><option>米</option><option>呎</option></select>
        <input type="number" id="v2" class="w-full p-2 border rounded mb-2" disabled>
        <select id="unit2" onchange="calc()" class="w-full p-2 border rounded mb-2"><option>磅</option><option>公斤</option><option>呎</option><option>米</option></select>
        <div class="bg-white p-2 rounded" id="uc"></div>`;
        function calc(){
          const v=parseFloat(document.getElementById('v1').value)||0;
          const u1=document.getElementById('unit1').value;
          const u2=document.getElementById('unit2').value;
          let r=0,t='';
          if(u1==='公斤'&&u2==='磅'){r=v*2.2;t='1 公斤 = 2.2 磅'}
          if(u1==='磅'&&u2==='公斤'){r=v/2.2;t='1 磅 = 0.45 公斤'}
          if(u1==='米'&&u2==='呎'){r=v*3.28;t='1 米 = 3.28 呎'}
          if(u1==='呎'&&u2==='米'){r=v/3.28;t='1 呎 = 0.3048 米'}
          document.getElementById('v2').value=r.toFixed(2);
          document.getElementById('uc').innerText=t;
        }
      }

      if(t==='todo'){
        tool.innerHTML+=`
        <h2 class="text-xl font-bold mb-3">✅ 待辦事項</h2>
        <div class="grid grid-cols-3 gap-2">
        <div onclick="this.innerHTML='已完成✅'" class="bg-white p-3 rounded text-center">1月</div>
        <div onclick="this.innerHTML='已完成✅'" class="bg-white p-3 rounded text-center">2月</div>
        <div onclick="this.innerHTML='已完成✅'" class="bg-white p-3 rounded text-center">3月</div>
        </div>
        <button class="mt-4 bg-earth text-white p-2 rounded">+ 新增</button>`;
      }

      if(t==='translate'){
        tool.innerHTML+=`
        <h2 class="text-xl font-bold mb-3">🌐 線上翻譯</h2>
        <iframe width="100%" height="500" src="https://translate.google.com/"></iframe>`;
      }

      if(t==='rate'){
        tool.innerHTML+=`
        <h2 class="text-xl font-bold mb-3">💱 匯率轉換</h2>
        <input type="number" id="r1" oninput="rc()" class="w-full p-2 border rounded mb-2" value="1">
        <select class="w-full p-2 border rounded mb-2"><option>HKD</option><option>USD</option><option>CNY</option></select>
        <input type="number" id="r2" class="w-full p-2 border rounded mb-2" disabled>
        <select class="w-full p-2 border rounded mb-2"><option>CNY</option><option>HKD</option><option>USD</option></select>
        <div class="bg-white p-2 rounded">1 HKD = 0.92 CNY</div>`;
        function rc(){document.getElementById('r2').value=(document.getElementById('r1').value*0.92).toFixed(2)}
      }

      if(t==='color'){
        tool.innerHTML+=`
        <h2 class="text-xl font-bold mb-3">🎨 色彩靈感</h2>
        <input type="color" id="cc" oninput="co()" class="w-full h-12 rounded mb-3">
        <div class="grid grid-cols-5 gap-1 mb-3">
        <div class="h-12 rounded" style="background:#EFEBE5"></div>
        <div class="h-12 rounded" style="background:#D9D4CC"></div>
        <div class="h-12 rounded" style="background:#BFB8AD"></div>
        <div class="h-12 rounded" style="background:#8C867E"></div>
        <div class="h-12 rounded" style="background:#59544D"></div>
        </div>
        <div class="bg-white p-2 rounded">RGB: #8C867E</div>`;
      }
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
